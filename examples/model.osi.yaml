# Sample OSI v1.0 model exported from a Databricks Metric View.
# This file is regenerated by `python -m osi_bridge.exporter --fqn ... --out ...`
# against your own Metric View. The placeholder FQN below uses generic names —
# replace with your real catalog when you regenerate.
version: '1.0'
semantic_model:
- name: orders_mv
  description: Sales orders semantic model — OSI demo
  ai_context:
    instructions: Semantic model exported from a Databricks Metric View. Use the metrics
      defined here for any quantitative question about orders or revenue.
  datasets:
  - name: orders_mv
    source: samples.tpch.orders
    fields:
    - name: order_priority
      description: TPC-DS order priority — 1-URGENT through 5-LOW
      expression:
      - dialect: Databricks
        sql: o_orderpriority
      dimension:
        is_time: false
      ai_context:
        synonyms: [priority, urgency]
        display_name: Order Priority
    - name: order_status
      description: O = open, F = fulfilled, P = in-progress
      expression:
      - dialect: Databricks
        sql: o_orderstatus
      dimension:
        is_time: false
      ai_context:
        synonyms: [status, state]
        display_name: Order Status
    - name: clerk
      description: Clerk who processed the order
      expression:
      - dialect: Databricks
        sql: o_clerk
      dimension:
        is_time: false
      ai_context:
        synonyms: []
        display_name: Clerk
    - name: order_date
      description: Date the order was placed
      expression:
      - dialect: Databricks
        sql: o_orderdate
      dimension:
        is_time: true
      ai_context:
        synonyms: [date, when, period]
        display_name: Order Date
  metrics:
  - name: total_revenue
    description: Sum of order totals across all orders
    expression:
    - dialect: Databricks
      sql: SUM(o_totalprice)
    ai_context:
      synonyms: [revenue, sales, gmv, top line]
      display_name: Total Revenue
  - name: order_count
    description: Distinct count of orders
    expression:
    - dialect: Databricks
      sql: COUNT(*)
    ai_context:
      synonyms: [orders, number of orders, volume]
      display_name: Order Count
  - name: avg_order_value
    description: Mean of o_totalprice across orders
    expression:
    - dialect: Databricks
      sql: AVG(o_totalprice)
    ai_context:
      synonyms: [aov, average sale, basket size]
      display_name: Average Order Value
  custom_extensions:
    databricks:
      metric_view_fqn: <catalog>.osi_demo.orders_mv
      query_pattern: SELECT MEASURE(<metric>), <dims> FROM <fqn> WHERE <filters>
        GROUP BY <dims>
